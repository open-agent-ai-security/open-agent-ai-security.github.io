# Daily community-stats snapshot.
#
# GitHub's traffic API keeps only a 14-day rolling window and purges older data.
# This job pulls it every day and commits the result, so stats/repo-traffic.json
# ACCUMULATES history past that 14-day horizon (fetch_repo_traffic.py merges each
# day's buckets), and also refreshes PyPI downloads and the star-trend chart. The
# rendered stats page (stats/index.html) still needs a manual `generate.py` run
# with a fresh GoatCounter export — that analytics data isn't available in CI.
#
# FAIL-SOFT BY DESIGN: the no-auth sources (PyPI, stars) run first and never fail
# the job; the cross-repo traffic pull needs a PAT and warns-and-continues if the
# token is missing/unapproved, so the rest still refreshes and commits daily.
#
# ── One-time setup (to enable the repo-traffic half) ─────────────────────────
# The default GITHUB_TOKEN can only read THIS repo's traffic. Reading praxen +
# observra traffic needs a token with access to those repos. Create a
# fine-grained PAT and add it as the repo secret `TRAFFIC_PAT`:
#
#   github.com → Settings → Developer settings → Personal access tokens →
#     Fine-grained tokens → Generate new token
#     • Resource owner: open-agent-ai-security
#     • Repository access: praxen AND observra (and this repo)
#     • Permissions: Administration → Read-only, Metadata → Read-only
#   The token needs ORG APPROVAL (owner: Settings → Personal access tokens →
#   Pending requests). Then: this repo → Settings → Secrets and variables →
#     Actions → New repository secret → name: TRAFFIC_PAT, value: <the token>
#
# Trigger manually once (Actions tab → this workflow → Run workflow) to verify:
# a real run runs longer than a few seconds and commits a snapshot.

name: Daily community-stats snapshot

on:
  schedule:
    # Run TWICE daily, ~12h apart. GoatCounter's per-hit export is rate-limited
    # (once/hour) and the landing time — not the cron time — is what matters,
    # because GitHub's scheduled-run delay shifts these by ~1–3.5h.
    #
    # The 13:23 slot lands ~14:30 UTC and succeeds consistently. The old 01:23
    # slot landed ~04:16–04:56 UTC and hit HTTP 429 on EVERY run (2026-07-18/19/20,
    # 3 for 3) — the hourly export budget was already spent ~1s before it fired,
    # so fetch_goatcounter.py bailed and generate.py was skipped, silently
    # freezing /stats. The job still exited 0, so it looked green while doing
    # nothing. Moved to 23:23 UTC, which lands ~00:20–02:50 — clear of that dead
    # window and still ~12h from the working slot. Odd minutes dodge the
    # top-of-hour queue.
    - cron: "23 23 * * *"   # 23:23 UTC → lands ~00:20–02:50
    - cron: "23 13 * * *"   # 13:23 UTC → lands ~14:30
  workflow_dispatch: {}      # manual trigger

permissions:
  contents: write            # commit the snapshot back to the repo

concurrency:
  group: repo-traffic
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── No-auth sources: always run, never fail the job ──────────────────────
      - name: Pull PyPI downloads (no auth)
        run: python3 stats/fetch_pypi_downloads.py || echo "::warning::PyPI pull failed — keeping prior snapshot."

      - name: Refresh star chart (cross-repo stargazers; uses TRAFFIC_PAT)
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT }}
        run: python3 stats/make_stars_svg.py || echo "::warning::star-chart refresh failed (needs TRAFFIC_PAT — default GITHUB_TOKEN can't read cross-repo stargazers) — keeping prior SVG."

      # ── Cross-repo traffic: needs TRAFFIC_PAT; fails SOFT ────────────────────
      # A missing or unapproved token warns and the job continues, so the no-auth
      # refresh above still commits. The default Actions GITHUB_TOKEN can't read
      # other repos' traffic, hence the PAT (see header).
      - name: Pull repo traffic (needs TRAFFIC_PAT)
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::TRAFFIC_PAT secret not set — skipping repo-traffic pull (see workflow header)."
          elif ! python3 stats/fetch_repo_traffic.py; then
            echo "::warning::repo-traffic pull failed (HTTP 403 usually means the fine-grained token is not yet org-approved, or lacks Administration:read on the repos) — keeping prior snapshot; PyPI + stars still refreshed below."
          fi

      # ── GoatCounter site traffic: per-hit CSV export merged with the committed
      # baseline (fetch_goatcounter.py → stats/goatcounter-merged/, gitignored).
      # Needs GOATCOUNTER_API_TOKEN. Fails SOFT — on any error (rate-limit,
      # token/API issue) no merged dir is written, and the regen step below is
      # GATED on that dir, so a failed pull keeps the prior index.html instead of
      # falling back to generate.py's sample data. (Export is once/hour; the
      # daily schedule is well within that.)
      - name: Pull GoatCounter site traffic (needs GOATCOUNTER_API_TOKEN)
        env:
          GOATCOUNTER_API_TOKEN: ${{ secrets.GOATCOUNTER_API_TOKEN }}
        run: |
          if [ -z "$GOATCOUNTER_API_TOKEN" ]; then
            echo "::warning::GOATCOUNTER_API_TOKEN not set — skipping GoatCounter pull; index.html left as-is."
          elif ! out=$(python3 stats/fetch_goatcounter.py 2>&1); then
            echo "$out"                        # full output still lands in the log
            # Surface the actual cause in the run-summary annotation, not a generic
            # guess — fetch_goatcounter.py's api() prints the method/URL/status/body
            # on the last line, so a stale /stats page is legible from the summary.
            echo "::warning::GoatCounter pull failed — keeping prior /stats page (frozen until the next good run). Cause: $(printf '%s\n' "$out" | tail -1)"
          else
            echo "$out"
          fi

      # Regenerate the whole page — GATED on a successful GoatCounter merge, so
      # we never render generate.py's sample fallback into the committed page.
      - name: Regenerate dashboard (only if the GoatCounter feed is present)
        run: |
          if [ -f stats/goatcounter-merged/paths.jsonl ]; then
            python3 stats/generate.py
          else
            echo "::warning::no goatcounter-merged/ — skipping generate.py; keeping the committed index.html."
          fi

      - name: Commit snapshot if changed
        run: |
          git config user.name "oaas-stats-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/repo-traffic.json stats/community-stars.svg stats/pypi-downloads.json stats/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -s -m "stats: daily snapshot — GoatCounter + repo-traffic + stars + PyPI, page regenerated [skip ci]"
            git push
          fi
